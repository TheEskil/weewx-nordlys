# Nordlys skin configuration
#
# This file is the entire user interface of the skin: pages, layout,
# tiles, theme tokens, and units are all configured here. No template
# or JavaScript edits are ever required.

SKIN_NAME = Nordlys
SKIN_VERSION = 0.1.0

###############################################################################

[Nordlys]

    # Optional display name for the station; defaults to the weewx
    # station location if not set.
    # site_name = Aldersundet weather

    # Optional extra stylesheet, path relative to the generated site root.
    # For overrides beyond what the [[theme]] tokens cover.
    # user_css = user.css

    [[theme]]
        # auto follows the visitor's system preference (dark is the
        # Nordlys hero theme). Force with dark or light.
        mode = auto

        # Any --nl-* design token can be overridden per mode, e.g.:
        # [[[dark]]]
        #     accent = "#3ddc97"
        # [[[light]]]
        #     bg = "#f6f9fc"

    # Date/time formats (strftime), shared by the SLE and the front-end
    # (extreme times, chart axes, footer, records). Defaults are 24-hour
    # time and European dates; uncomment to change. Not to be confused
    # with weewx's [Units][[TimeFormats]] (which formats Cheetah tags).
    # [[formats]]
    #     time = %H:%M                 # day-span extremes, records, live
    #     date = %d %b                 # month/year extremes, chart date ticks
    #     date_year = %d %b %Y         # all-time extremes, footer date
    #     datetime = %d %b %Y, %H:%M   # footer "Generated"
    #     weekday_time = %a %H:%M      # week-span extremes, records rows

    # SEO / social sharing. Meta descriptions and OpenGraph/Twitter cards
    # ship on every page automatically. og:url / og:image and sitemap.xml
    # need an absolute site root: set base_url here, or weewx's
    # [Station] station_url; without either, those absolute-only bits are
    # skipped (descriptions + cards with a relative image still render).
    # [[seo]]
    #     base_url = https://weather.example.com/nordlys
    #     description = Custom description for the whole site
    #     image = og-image.png         # social card, relative to the site root
    #     robots = true                # emit robots.txt + sitemap.xml

    # Live updates via MQTT over WebSocket (optional). The topic should
    # carry JSON loop packets with weewx observation names as keys
    # (unit suffixes like outTemp_C are accepted and stripped).
    # [[live]]
    #     broker = wss://example.com:9001
    #     topic = weather/loop

    # Climatological day definitions - first-class config. Each entry
    # counts the days (in the span) where the daily aggregate of an
    # observation compares true against the threshold (report units).
    #
    # Defaults follow the Norwegian (MET) conventions. To remove a
    # shipped default without editing this skin, set enable = false in
    # weewx.conf (ConfigObj merges but cannot delete a section):
    #     [[[Nordlys]]]
    #         [[[[climatological_days]]]]
    #             [[[[[ice_days]]]]]
    #                 enable = false
    # To retune, override just the value (e.g. summer_days value = 25 for
    # the German/DWD threshold). To add, define a new [[[...]]] section.
    [[climatological_days]]
        span = year
        [[[frost_days]]]            # Frostdøgn
            label = Frost days
            obs = outTemp
            aggregate = min
            op = <
            value = 0
        [[[ice_days]]]             # Isdøgn
            label = Ice days
            obs = outTemp
            aggregate = max
            op = <
            value = 0
        [[[summer_days]]]          # Sommerdager
            label = Summer days
            obs = outTemp
            aggregate = max
            op = >=
            value = 20
        [[[tropical_days]]]        # Tropedager
            label = Tropical days
            obs = outTemp
            aggregate = max
            op = >=
            value = 30
        [[[tropical_nights]]]      # Tropenetter (24 h min >= 20; see docs)
            label = Tropical nights
            obs = outTemp
            aggregate = min
            op = >=
            value = 20
        [[[precip_days]]]          # Nedbørdøgn
            label = Precipitation days
            obs = rain
            aggregate = sum
            op = >=
            value = 0.1
        [[[growing_days]]]         # Vekstdøgn
            label = Growing days
            obs = outTemp
            aggregate = avg
            op = >=
            value = 5
        [[[storm_days]]]           # Liten storm
            label = Storm days
            obs = windGust
            aggregate = max
            op = >=
            value = 20.8

    # Layout for the archive pages (month-YYYY-MM.html / year-YYYY.html,
    # generated per period by SummaryByMonth/SummaryByYear). Same row/tile
    # structure as a page; span = archive means "this page's period".
    [[archive]]
        [[[summary]]]
            title = Summary
            columns = 4
            [[[[outTemp]]]]
                type = stat
                span = archive
                cold_below = 0
                hot_above = 25
            [[[[dewpoint]]]]
                type = stat
                span = archive
            [[[[outHumidity]]]]
                type = stat
                span = archive
            [[[[barometer]]]]
                type = stat
                span = archive
            [[[[windSpeed]]]]
                type = stat
                span = archive
            [[[[windGust]]]]
                type = stat
                span = archive
            [[[[rain]]]]
                type = stat
                span = archive
                title = Rain total
        [[[charts]]]
            columns = 2
            [[[[temperature]]]]
                type = chart
                chart = line
                obs = outTemp, dewpoint
                span = archive
                title = Temperature
            [[[[wind]]]]
                type = chart
                chart = line
                obs = windSpeed, windGust
                span = archive
                title = Wind
            [[[[barometer_chart]]]]
                type = chart
                chart = line
                obs = barometer
                span = archive
                title = Barometer
            [[[[rain_chart]]]]
                type = chart
                chart = bar
                obs = rain
                span = archive
                title = Rain per day
            [[[[humidity_chart]]]]
                type = chart
                chart = line
                obs = outHumidity
                span = archive
                title = Humidity
            [[[[windrose]]]]
                type = chart
                chart = windrose
                span = archive
                title = Wind rose
        [[[data]]]
            title = Archive data
            columns = 1
            [[[[records]]]]
                type = table
                table = records
                span = archive
                obs = outTemp, outHumidity, barometer, windSpeed, windDir, rainRate

    [[pages]]

        [[[today]]]
            title = Today

            [[[[now]]]]
                title = Now
                columns = 4
                [[[[[outTemp]]]]]
                    type = gauge
                    min = -20
                    max = 35
                    # Semantic coloring: --nl-cold below, --nl-hot above.
                    cold_below = 0
                    hot_above = 25
                [[[[[barometer]]]]]
                    type = gauge
                    min = 960
                    max = 1060
                [[[[[windSpeed]]]]]
                    type = gauge
                    min = 0
                    max = 25
                [[[[[windDir]]]]]
                    type = gauge
                    style = compass

            # Observations (current values) sit above the charts, so Today
            # reads current -> context -> history like the period pages.
            [[[[observations]]]]
                title = Observations
                columns = 4
                [[[[[appTemp]]]]]
                    type = stat
                [[[[[dewpoint]]]]]
                    type = stat
                [[[[[outHumidity]]]]]
                    type = stat
                [[[[[windGust]]]]]
                    type = stat
                [[[[[rain]]]]]
                    type = stat
                    title = Rain today
                [[[[[rainRate]]]]]
                    type = stat
                [[[[[UV]]]]]
                    type = stat
                    hot_above = 5
                [[[[[radiation]]]]]
                    type = stat

            [[[[sky]]]]
                columns = 2
                [[[[[celestial]]]]]
                    type = celestial
                    title = Sun & moon
                [[[[[forecast]]]]]
                    type = forecast
                    title = Forecast

            [[[[charts]]]]
                title = Today
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint, appTemp
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    title = Barometer
                [[[[[humidity_chart]]]]]
                    type = chart
                    chart = line
                    obs = outHumidity
                    title = Humidity
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    title = Rain
                [[[[[winddir_chart]]]]]
                    type = chart
                    chart = scatter
                    obs = windDir
                    title = Wind direction
                [[[[[radiation_chart]]]]]
                    type = chart
                    chart = area
                    obs = radiation
                    title = Solar radiation
                [[[[[windrose]]]]]
                    type = chart
                    chart = windrose
                    title = Wind rose
                    # bands = 2, 4, 6, 9, 12    # upper bounds, report units
                    # calm_below = 0.5

            [[[[data]]]]
                title = Archive data (24 h)
                columns = 1
                [[[[[records]]]]]
                    type = table
                    table = records
                    span = 24h
                    obs = outTemp, outHumidity, barometer, windSpeed, windDir, rainRate

        [[[yesterday]]]
            title = Yesterday

            [[[[charts]]]]
                title = Yesterday
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint, appTemp
                    span = yesterday
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    span = yesterday
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    span = yesterday
                    title = Barometer
                [[[[[humidity_chart]]]]]
                    type = chart
                    chart = line
                    obs = outHumidity
                    span = yesterday
                    title = Humidity
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    span = yesterday
                    title = Rain
                [[[[[windrose]]]]]
                    type = chart
                    chart = windrose
                    span = yesterday
                    title = Wind rose

            [[[[stats]]]]
                title = Yesterday's statistics
                columns = 1
                [[[[[stats_table]]]]]
                    type = table
                    table = stats
                    span = yesterday
                    obs = outTemp, dewpoint, outHumidity, barometer, windSpeed, windGust, rain

        [[[week]]]
            title = Week
            picker = week

            [[[[summary]]]]
                title = This week
                columns = 4
                [[[[[outTemp]]]]]
                    type = stat
                    span = week
                    cold_below = 0
                    hot_above = 25
                [[[[[dewpoint]]]]]
                    type = stat
                    span = week
                [[[[[outHumidity]]]]]
                    type = stat
                    span = week
                [[[[[barometer]]]]]
                    type = stat
                    span = week
                [[[[[windSpeed]]]]]
                    type = stat
                    span = week
                [[[[[windGust]]]]]
                    type = stat
                    span = week
                [[[[[rain]]]]]
                    type = stat
                    span = week
                    title = Rain total

            [[[[charts]]]]
                title = Last 7 days
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint
                    span = week
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    span = week
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    span = week
                    title = Barometer
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    span = week
                    title = Rain per day
                [[[[[humidity_chart]]]]]
                    type = chart
                    chart = line
                    obs = outHumidity
                    span = week
                    title = Humidity
                [[[[[windrose]]]]]
                    type = chart
                    chart = windrose
                    span = week
                    title = Wind rose

            [[[[data]]]]
                title = Archive data (7 days)
                columns = 1
                [[[[[records]]]]]
                    type = table
                    table = records
                    span = week
                    obs = outTemp, outHumidity, barometer, windSpeed, windDir, rainRate

        [[[month]]]
            title = Month
            picker = month

            [[[[summary]]]]
                title = This month
                columns = 4
                [[[[[outTemp]]]]]
                    type = stat
                    span = month
                    cold_below = 0
                    hot_above = 25
                [[[[[dewpoint]]]]]
                    type = stat
                    span = month
                [[[[[outHumidity]]]]]
                    type = stat
                    span = month
                [[[[[barometer]]]]]
                    type = stat
                    span = month
                [[[[[windSpeed]]]]]
                    type = stat
                    span = month
                [[[[[windGust]]]]]
                    type = stat
                    span = month
                [[[[[rain]]]]]
                    type = stat
                    span = month
                    title = Rain total

            [[[[charts]]]]
                title = Last 30 days
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint
                    span = month
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    span = month
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    span = month
                    title = Barometer
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    span = month
                    title = Rain per day

            [[[[data]]]]
                title = Archive data (30 days)
                columns = 1
                [[[[[records]]]]]
                    type = table
                    table = records
                    span = month
                    obs = outTemp, outHumidity, barometer, windSpeed, windDir, rainRate

        [[[year]]]
            title = Year
            picker = year

            [[[[summary]]]]
                title = This year
                columns = 4
                [[[[[outTemp]]]]]
                    type = stat
                    span = year
                    cold_below = 0
                    hot_above = 25
                [[[[[dewpoint]]]]]
                    type = stat
                    span = year
                [[[[[outHumidity]]]]]
                    type = stat
                    span = year
                [[[[[barometer]]]]]
                    type = stat
                    span = year
                [[[[[windSpeed]]]]]
                    type = stat
                    span = year
                [[[[[windGust]]]]]
                    type = stat
                    span = year
                [[[[[rain]]]]]
                    type = stat
                    span = year
                    title = Rain total

            [[[[charts]]]]
                title = Last 12 months
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint
                    span = year
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    span = year
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    span = year
                    title = Barometer
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    span = year
                    title = Rain per day
                [[[[[windrose]]]]]
                    type = chart
                    chart = windrose
                    span = year
                    title = Wind rose

            [[[[data]]]]
                title = Archive data (12 months)
                columns = 1
                [[[[[records]]]]]
                    type = table
                    table = records
                    span = year
                    obs = outTemp, outHumidity, barometer, windSpeed, windDir, rainRate

        [[[climate]]]
            title = Climate

            [[[[days]]]]
                title = Climatological days
                columns = 1
                [[[[[climodays]]]]]
                    type = climatology

            [[[[calendar]]]]
                title = Temperature calendar
                columns = 1
                [[[[[climatogram]]]]]
                    type = chart
                    chart = calendar
                    obs = outTemp
                    aggregate = avg

            [[[[stats]]]]
                title = This year
                columns = 1
                [[[[[stats_table]]]]]
                    type = table
                    table = stats
                    span = year
                    obs = outTemp, dewpoint, outHumidity, barometer, windSpeed, windGust, rain

        [[[celestial]]]
            title = Celestial

            [[[[path]]]]
                columns = 1
                [[[[[sunpath]]]]]
                    type = celestial
                    section = sunpath
                    title = Sun path

            [[[[sky]]]]
                columns = 2
                [[[[[sun]]]]]
                    type = celestial
                    section = sun
                    title = Sun
                [[[[[moon]]]]]
                    type = celestial
                    section = moon
                    title = Moon

            [[[[calendar]]]]
                columns = 2
                [[[[[seasons]]]]]
                    type = celestial
                    section = seasons
                    title = Seasons
                [[[[[planets]]]]]
                    type = celestial
                    section = planets
                    title = Planets

        # The 'archive' page id (this browser tab, archive.html) is
        # distinct from the [Nordlys][[archive]] per-period layout section
        # above - different config paths, no clash.
        [[[archive]]]
            title = Archive

            [[[[records]]]]
                title = All-time records
                columns = 1
                [[[[[alltime]]]]]
                    type = table
                    table = stats
                    span = alltime
                    style = cards
                    obs = outTemp, windGust, rain

            [[[[reports]]]]
                title = Periods & reports
                columns = 1
                [[[[[archives]]]]]
                    type = reports
                    # At-a-glance stats per period in the browser.
                    stats = outTemp, rain

###############################################################################

[Units]
    [[Labels]]
        # Metric weewx stations report pressure in mbar, but Nordic /
        # European convention - and nearly every weather site - labels
        # the numerically identical value as hPa. Nordlys defaults to
        # hPa. To show real "mbar" instead, set this to " mbar" (or
        # override group_pressure in weewx.conf's [[NordlysReport]]).
        mbar = " hPa"

###############################################################################

[Labels]
    # Display names for observations. Overridable here or via lang files
    # (i18n arrives in a later milestone).
    [[Generic]]
        outTemp = Outside temperature
        appTemp = Feels like
        dewpoint = Dew point
        outHumidity = Humidity
        barometer = Barometer
        windSpeed = Wind speed
        windGust = Wind gust
        windDir = Wind direction
        rain = Rain
        rainRate = Rain rate
        UV = UV index
        radiation = Solar radiation

###############################################################################

[CheetahGenerator]
    # utf8, not html_entities: the JSON payload lives inside a <script>
    # element where character references are not decoded.
    encoding = utf8
    search_list_extensions = user.nordlys.NordlysSearchList
    [[SummaryByMonth]]
        [[[archive_month]]]
            template = month-%Y-%m.html.tmpl
        [[[noaa_month]]]
            template = NOAA/NOAA-%Y-%m.txt.tmpl

    [[SummaryByYear]]
        [[[archive_year]]]
            template = year-%Y.html.tmpl
        [[[noaa_year]]]
            template = NOAA/NOAA-%Y.txt.tmpl
        [[[climate_year]]]
            template = climate-%Y.json.tmpl

    [[ToDate]]
        [[[manifest]]]
            template = nordlys.webmanifest.tmpl
        [[[robots]]]
            template = robots.txt.tmpl
        [[[sitemap]]]
            template = sitemap.xml.tmpl

###############################################################################

# One canonical HTML file per [Nordlys][[pages]] page (<id>.html, first
# page also index.html), emitted by NordlysPageGenerator from the shared
# page shell. Page files follow the config automatically.
[NordlysPageGenerator]
    encoding = utf8
    template = page.html.tmpl
    search_list_extensions = user.nordlys.NordlysSearchList

###############################################################################

# Per-week archive pages. weewx has no SummaryByWeek, so Nordlys ships
# NordlysWeekGenerator (in the generator_list below) which registers a
# weekly span and reuses the CheetahGenerator machinery. Filenames are
# keyed by the week's start date (unambiguous regardless of week_start).
[NordlysWeekGenerator]
    encoding = utf8
    search_list_extensions = user.nordlys.NordlysSearchList
    [[SummaryByWeek]]
        [[[archive_week]]]
            template = week-%Y-%m-%d.html.tmpl

###############################################################################

[CopyGenerator]
    # Built front-end assets (vite build output). The mqtt chunk is
    # loaded on demand by browsers when [Nordlys][[live]] is configured.
    copy_once = dist/nordlys.js, dist/nordlys.css, dist/nordlys.mqtt.esm.js, sw.js, icon.svg, og-image.png

###############################################################################

[Generators]
    generator_list = weewx.cheetahgenerator.CheetahGenerator, user.nordlys.NordlysPageGenerator, user.nordlys.NordlysWeekGenerator, weewx.reportengine.CopyGenerator
