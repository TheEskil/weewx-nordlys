# Nordlys skin configuration
#
# This file is the entire user interface of the skin: pages, layout,
# tiles, theme tokens, and units are all configured here. No template
# or JavaScript edits are ever required.

SKIN_NAME = Nordlys
SKIN_VERSION = 0.1.0

###############################################################################

[Nordlys]

    # Optional display name for the station; defaults to the weewx
    # station location if not set.
    # site_name = Aldersundet weather

    # Optional extra stylesheet, path relative to the generated site root.
    # For overrides beyond what the [[theme]] tokens cover.
    # user_css = user.css

    [[theme]]
        # auto follows the visitor's system preference (dark is the
        # Nordlys hero theme). Force with dark or light.
        mode = auto

        # Any --nl-* design token can be overridden per mode, e.g.:
        # [[[dark]]]
        #     accent = "#3ddc97"
        # [[[light]]]
        #     bg = "#f6f9fc"

    # Live updates via MQTT over WebSocket (optional). The topic should
    # carry JSON loop packets with weewx observation names as keys
    # (unit suffixes like outTemp_C are accepted and stripped).
    # [[live]]
    #     broker = wss://example.com:9001
    #     topic = weather/loop

    # Climatological day definitions - first-class config. Each entry
    # counts the days (in the span) where the daily aggregate of an
    # observation compares true against the threshold (report units).
    [[climatological_days]]
        span = year
        [[[frost_days]]]
            label = Frost days
            obs = outTemp
            aggregate = min
            op = <
            value = 0
        [[[summer_days]]]
            label = Summer days
            obs = outTemp
            aggregate = max
            op = >=
            value = 25
        [[[warm_days]]]
            label = Warm days
            obs = outTemp
            aggregate = max
            op = >=
            value = 20
        [[[rain_days]]]
            label = Rain days
            obs = rain
            aggregate = sum
            op = >=
            value = 0.1
        [[[storm_days]]]
            label = Storm days
            obs = windGust
            aggregate = max
            op = >=
            value = 20.8

    [[pages]]

        [[[today]]]
            title = Today

            [[[[now]]]]
                title = Now
                columns = 4
                [[[[[outTemp]]]]]
                    type = gauge
                    min = -20
                    max = 35
                    # Semantic coloring: --nl-cold below, --nl-hot above.
                    cold_below = 0
                    hot_above = 25
                [[[[[barometer]]]]]
                    type = gauge
                    min = 960
                    max = 1060
                [[[[[windSpeed]]]]]
                    type = gauge
                    min = 0
                    max = 25
                [[[[[windDir]]]]]
                    type = gauge
                    style = compass

            [[[[charts]]]]
                title = Last 24 hours
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint, appTemp
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    title = Barometer
                [[[[[humidity_chart]]]]]
                    type = chart
                    chart = line
                    obs = outHumidity
                    title = Humidity
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    title = Rain
                [[[[[winddir_chart]]]]]
                    type = chart
                    chart = scatter
                    obs = windDir
                    title = Wind direction
                [[[[[radiation_chart]]]]]
                    type = chart
                    chart = area
                    obs = radiation
                    title = Solar radiation
                [[[[[windrose]]]]]
                    type = chart
                    chart = windrose
                    title = Wind rose
                    # bands = 2, 4, 6, 9, 12    # upper bounds, report units
                    # calm_below = 0.5

            [[[[sky]]]]
                columns = 2
                [[[[[celestial]]]]]
                    type = celestial
                    title = Sun & moon
                [[[[[forecast]]]]]
                    type = forecast
                    title = Forecast

            [[[[observations]]]]
                title = Observations
                columns = 4
                [[[[[appTemp]]]]]
                    type = stat
                [[[[[dewpoint]]]]]
                    type = stat
                [[[[[outHumidity]]]]]
                    type = stat
                [[[[[windGust]]]]]
                    type = stat
                [[[[[rain]]]]]
                    type = stat
                    title = Rain today
                [[[[[rainRate]]]]]
                    type = stat
                [[[[[UV]]]]]
                    type = stat
                    hot_above = 5
                [[[[[radiation]]]]]
                    type = stat

            [[[[data]]]]
                title = Archive data (24 h)
                columns = 1
                [[[[[records]]]]]
                    type = table
                    table = records
                    span = day
                    obs = outTemp, outHumidity, barometer, windSpeed, windDir, rainRate

        [[[week]]]
            title = Week

            [[[[charts]]]]
                title = Last 7 days
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint
                    span = week
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    span = week
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    span = week
                    title = Barometer
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    span = week
                    title = Rain per day
                [[[[[humidity_chart]]]]]
                    type = chart
                    chart = line
                    obs = outHumidity
                    span = week
                    title = Humidity
                [[[[[windrose]]]]]
                    type = chart
                    chart = windrose
                    span = week
                    title = Wind rose

            [[[[stats]]]]
                title = This week
                columns = 1
                [[[[[stats_table]]]]]
                    type = table
                    table = stats
                    span = week
                    obs = outTemp, dewpoint, outHumidity, barometer, windSpeed, windGust, rain

        [[[month]]]
            title = Month

            [[[[charts]]]]
                title = Last 30 days
                columns = 2
                [[[[[temperature]]]]]
                    type = chart
                    chart = line
                    obs = outTemp, dewpoint
                    span = month
                    title = Temperature
                [[[[[wind]]]]]
                    type = chart
                    chart = line
                    obs = windSpeed, windGust
                    span = month
                    title = Wind
                [[[[[barometer_chart]]]]]
                    type = chart
                    chart = line
                    obs = barometer
                    span = month
                    title = Barometer
                [[[[[rain_chart]]]]]
                    type = chart
                    chart = bar
                    obs = rain
                    span = month
                    title = Rain per day

            [[[[stats]]]]
                title = This month
                columns = 1
                [[[[[stats_table]]]]]
                    type = table
                    table = stats
                    span = month
                    obs = outTemp, dewpoint, outHumidity, barometer, windSpeed, windGust, rain

        [[[climate]]]
            title = Climate

            [[[[days]]]]
                title = Climatological days
                columns = 1
                [[[[[climodays]]]]]
                    type = climatology

            [[[[calendar]]]]
                title = Temperature calendar
                columns = 1
                [[[[[climatogram]]]]]
                    type = chart
                    chart = calendar
                    obs = outTemp
                    aggregate = avg

            [[[[stats]]]]
                title = This year
                columns = 1
                [[[[[stats_table]]]]]
                    type = table
                    table = stats
                    span = year
                    obs = outTemp, dewpoint, outHumidity, barometer, windSpeed, windGust, rain

###############################################################################

[Labels]
    # Display names for observations. Overridable here or via lang files
    # (i18n arrives in a later milestone).
    [[Generic]]
        outTemp = Outside temperature
        appTemp = Feels like
        dewpoint = Dew point
        outHumidity = Humidity
        barometer = Barometer
        windSpeed = Wind speed
        windGust = Wind gust
        windDir = Wind direction
        rain = Rain
        rainRate = Rain rate
        UV = UV index
        radiation = Solar radiation

###############################################################################

[CheetahGenerator]
    # utf8, not html_entities: the JSON payload lives inside a <script>
    # element where character references are not decoded.
    encoding = utf8
    search_list_extensions = user.nordlys.NordlysSearchList
    [[ToDate]]
        [[[index]]]
            template = index.html.tmpl

###############################################################################

[CopyGenerator]
    # Built front-end assets (vite build output). The mqtt chunk is
    # loaded on demand by browsers when [Nordlys][[live]] is configured.
    copy_once = dist/nordlys.js, dist/nordlys.css, dist/nordlys.mqtt.esm.js

###############################################################################

[Generators]
    generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator
